<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ADN VS Crunchyroll</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <h1>ADN VS CRUNCHYROLL</h1>
    <p class="sub">Catalogues · Exclusivités · Comparatif</p>
    <div class="line"></div>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat-card" style="--accent:#3b9dff;--accent-dim:#3b9dff22;">
      <div class="val">200K</div><div class="lbl">Abonnés ADN</div>
    </div>
    <div class="stat-card" style="--accent:#ff6b2b;--accent-dim:#ff6b2b22;">
      <div class="val">21M</div><div class="lbl">Abonnés CR</div>
    </div>
    <div class="stat-card" style="--accent:#3b9dff;--accent-dim:#3b9dff22;">
      <div class="val">500+</div><div class="lbl">Séries ADN</div>
    </div>
    <div class="stat-card" style="--accent:#ff6b2b;--accent-dim:#ff6b2b22;">
      <div class="val">50K+</div><div class="lbl">Épisodes CR</div>
    </div>
  </div>

  <!-- ARENA -->
  <div class="arena">

    <!-- COLONNE ADN -->
    <div class="column" id="col-adn"
      style="--accent:#3b9dff;--accent-dim:#3b9dff30;--accent-bg:#3b9dff0d;--accent-mid:#3b9dffaa;--accent-glow:#3b9dff66;">
      <div class="col-header">
        <div class="col-bar"></div>
        <div>
          <div class="col-name">ADN</div>
          <div class="col-sub">ANIME DIGITAL NETWORK</div>
        </div>
      </div>
      <div class="cards-grid" id="grid-adn"></div>
    </div>

    <!-- VS -->
    <div class="vs-divider">
      <div class="vs-line top"></div>
      <div class="vs-text">VS</div>
      <div class="vs-line bot"></div>
    </div>

    <!-- COLONNE CRUNCHYROLL -->
    <div class="column" id="col-cr"
      style="--accent:#ff6b2b;--accent-dim:#ff6b2b30;--accent-bg:#ff6b2b0d;--accent-mid:#ff6b2baa;--accent-glow:#ff6b2b66;">
      <div class="col-header">
        <div class="col-bar"></div>
        <div>
          <div class="col-name">Crunchyroll</div>
          <div class="col-sub">STREAMING MONDIAL</div>
        </div>
      </div>
      <div class="cards-grid" id="grid-cr"></div>
    </div>

  </div>

  <!-- FOOTER -->
  <div class="footer">Images : MyAnimeList via Jikan API · Les droits de diffusion peuvent évoluer</div>

  <script src="script.js"></script>
</body>
</html>
